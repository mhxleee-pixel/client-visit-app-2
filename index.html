<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>智慧客戶拜訪系統</title>
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- SheetJS -->
    <script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
    <!-- Marked -->
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    
    <style>
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
        * { -webkit-tap-highlight-color: transparent; }
        
        /* Markdown 樣式 */
        .markdown-body h3 { font-size: 1.125rem; font-weight: 600; margin-top: 1rem; margin-bottom: 0.5rem; color: #1e40af; }
        .markdown-body p { margin-bottom: 0.75rem; line-height: 1.5; color: #334155; }
        .markdown-body ul { list-style-type: disc; padding-left: 1.25rem; margin-bottom: 0.75rem; color: #334155; }
        .markdown-body strong { font-weight: 600; color: #0f172a; }
        
        /* 避免 iOS 輸入框縮放 */
        input, textarea { font-size: 16px !important; }
    </style>
</head>
<body class="bg-slate-50 min-h-screen font-sans text-slate-800 pb-safe overflow-x-hidden">

    <!-- 階段一：頂部極簡導覽列 -->
    <header class="bg-white border-b border-slate-200 sticky top-0 z-30 shadow-sm">
        <div class="max-w-7xl mx-auto px-4 h-16 flex items-center justify-between">
            <div id="homeBtn" class="flex items-center gap-2 cursor-pointer">
                <div class="w-8 h-8 bg-blue-600 rounded-lg flex items-center justify-center text-white">
                    <i data-lucide="sparkles" class="w-5 h-5"></i>
                </div>
                <h1 class="text-xl font-bold text-slate-800 tracking-tight">智能拜訪助手</h1>
            </div>
            <button id="openSettingsBtn" class="p-2 text-slate-500 hover:text-slate-800 hover:bg-slate-100 rounded-full transition-colors focus:outline-none" title="進入後台設定">
                <i data-lucide="settings" class="w-6 h-6"></i>
            </button>
        </div>
    </header>

    <!-- 首頁系統狀態列 (膠囊標籤樣式) -->
    <div class="bg-white border-b border-slate-200 z-20 relative">
        <div class="max-w-7xl mx-auto px-4 py-3 flex flex-wrap gap-3 items-center">
            <!-- 本機記憶狀態 -->
            <div id="localMemoryStatus" class="flex items-center gap-2 px-4 py-1.5 bg-slate-50 border border-slate-200 rounded-full text-sm font-medium text-slate-600 shadow-sm transition-colors">
                <i data-lucide="smartphone" class="w-4 h-4"></i>
                <span>本機記憶：無資料</span>
            </div>
            <!-- 雲端備份狀態 -->
            <div id="cloudBackupStatus" class="flex items-center gap-2 px-4 py-1.5 bg-slate-50 border border-slate-200 rounded-full text-sm font-medium text-slate-600 shadow-sm transition-colors">
                <i data-lucide="cloud" class="w-4 h-4"></i>
                <span>雲端備份：檢查中...</span>
            </div>
        </div>
    </div>

    <!-- Firebase 管理員登入 Modal -->
    <div id="loginModalOverlay" class="fixed inset-0 bg-slate-900/60 z-[60] hidden backdrop-blur-sm flex items-center justify-center p-4">
        <div class="bg-white rounded-2xl shadow-xl w-full max-w-sm overflow-hidden transform scale-100 p-6 relative">
            <button id="closeLoginBtn" class="absolute top-4 right-4 text-slate-400 hover:text-slate-600 bg-slate-50 rounded-full p-1 transition-colors">
                <i data-lucide="x" class="w-5 h-5"></i>
            </button>
            <div class="text-center mb-6 mt-2">
                <div class="w-16 h-16 bg-blue-50 rounded-full flex items-center justify-center mx-auto mb-4">
                    <i data-lucide="lock" class="w-8 h-8 text-blue-600"></i>
                </div>
                <h3 class="text-xl font-bold text-slate-800 mb-1">管理員登入</h3>
                <p class="text-sm text-slate-500">請輸入 Firebase 帳號密碼進入後台</p>
            </div>
            <div class="space-y-4 mb-6">
                <input type="email" id="loginEmail" placeholder="電子信箱" class="w-full px-4 py-3 bg-slate-50 border border-slate-200 rounded-xl focus:outline-none focus:ring-2 focus:ring-blue-500 text-sm transition-colors">
                <input type="password" id="loginPassword" placeholder="密碼" class="w-full px-4 py-3 bg-slate-50 border border-slate-200 rounded-xl focus:outline-none focus:ring-2 focus:ring-blue-500 text-sm transition-colors">
                <div id="loginErrorMsg" class="hidden text-red-500 text-xs font-medium bg-red-50 p-3 rounded-lg border border-red-100 flex items-start gap-2">
                    <i data-lucide="alert-circle" class="w-4 h-4 shrink-0 mt-0.5"></i>
                    <span id="loginErrorText" class="leading-relaxed"></span>
                </div>
            </div>
            <button id="confirmLoginBtn" class="w-full bg-blue-600 hover:bg-blue-700 text-white font-medium py-3 rounded-xl transition-colors shadow-sm shadow-blue-600/20 active:scale-[0.98]">
                安全登入
            </button>
        </div>
    </div>

    <!-- 階段一：隱藏式設定面板 (Drawer) -->
    <div id="settingsOverlay" class="fixed inset-0 bg-slate-900/40 z-40 hidden backdrop-blur-sm transition-opacity"></div>
    <div id="settingsDrawer" class="fixed inset-y-0 right-0 w-80 max-w-[90vw] bg-white shadow-2xl transform translate-x-full transition-transform duration-300 z-50 flex flex-col">
        <div class="p-4 border-b border-slate-100 flex justify-between items-center bg-slate-50/50">
            <h2 class="font-bold text-lg text-slate-800 flex items-center gap-2">
                <i data-lucide="sliders" class="w-5 h-5 text-blue-600"></i> 系統後台
            </h2>
            <button id="closeSettingsBtn" class="p-1.5 text-slate-400 hover:text-slate-700 bg-white rounded-full shadow-sm border border-slate-200">
                <i data-lucide="x" class="w-5 h-5"></i>
            </button>
        </div>
        
        <div class="p-5 flex-1 overflow-y-auto space-y-6">
            <!-- Firebase 狀態 -->
            <div class="space-y-2">
                <h3 class="text-xs font-semibold text-slate-400 uppercase tracking-wider">雲端帳號</h3>
                <div id="authStatusBadge" class="flex items-center gap-2 px-3 py-2 rounded-lg text-sm font-medium bg-slate-100 text-slate-500 border border-slate-200 break-all">
                    <i data-lucide="loader-2" class="w-4 h-4 animate-spin shrink-0"></i> 驗證中...
                </div>
            </div>

            <!-- 資料管理 -->
            <div class="space-y-3">
                <h3 class="text-xs font-semibold text-slate-400 uppercase tracking-wider">資料庫管理</h3>
                
                <label class="w-full bg-blue-50 hover:bg-blue-100 text-blue-700 font-medium py-2.5 px-4 rounded-lg transition-colors flex items-center justify-center gap-2 cursor-pointer border border-blue-200">
                    <i data-lucide="upload-cloud" class="w-4 h-4"></i>
                    <span>上傳 / 覆蓋 Excel</span>
                    <input type="file" id="excelFile" accept=".xlsx, .xls" class="hidden">
                </label>
                
                <div id="fileStatus" class="hidden flex items-start gap-2 p-3 bg-green-50 text-green-700 text-xs rounded-lg border border-green-200 leading-relaxed"></div>

                <button id="exportBtn" class="w-full bg-white hover:bg-slate-50 text-slate-700 font-medium py-2.5 px-4 rounded-lg transition-colors flex items-center justify-center gap-2 border border-slate-200">
                    <i data-lucide="download" class="w-4 h-4"></i> 匯出最新備份
                </button>
                <button id="resetDataBtn" class="w-full bg-red-50 hover:bg-red-100 text-red-600 font-medium py-2.5 px-4 rounded-lg transition-colors flex items-center justify-center gap-2 border border-red-200">
                    <i data-lucide="trash-2" class="w-4 h-4"></i> 清除系統所有資料
                </button>
            </div>

            <!-- API 金鑰綁定 -->
            <div class="space-y-3">
                <h3 class="text-xs font-semibold text-slate-400 uppercase tracking-wider">AI 金鑰綁定</h3>
                <p class="text-xs text-slate-500">輸入專屬 Gemini API Key 以啟用生成功能。</p>
                <input type="password" id="customApiKey" placeholder="AIzaSy..." class="w-full px-3 py-2 bg-slate-50 border border-slate-200 rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-blue-500">
            </div>
        </div>
        
        <div class="p-4 border-t border-slate-100 space-y-3">
            <button id="logoutBtn" class="w-full bg-white border border-slate-200 text-slate-600 font-medium py-2.5 rounded-xl hover:bg-slate-50 transition-colors flex items-center justify-center gap-2">
                <i data-lucide="log-out" class="w-4 h-4"></i> 登出管理員
            </button>
            <button id="saveSettingsBtn" class="w-full bg-slate-800 text-white font-medium py-3 rounded-xl hover:bg-slate-900 transition-colors">
                完成設定並關閉
            </button>
        </div>
    </div>

    <!-- 確認清除的客製化 Modal -->
    <div id="confirmModalOverlay" class="fixed inset-0 bg-slate-900/40 z-[60] hidden backdrop-blur-sm flex items-center justify-center p-4">
        <div class="bg-white rounded-2xl shadow-xl w-full max-w-sm overflow-hidden transform scale-100">
            <div class="p-6 text-center">
                <div class="w-16 h-16 bg-red-50 rounded-full flex items-center justify-center mx-auto mb-4">
                    <i data-lucide="alert-triangle" class="w-8 h-8 text-red-500"></i>
                </div>
                <h3 class="text-lg font-bold text-slate-800 mb-2">確認清除所有資料？</h3>
                <p class="text-sm text-slate-500 mb-6">這個動作將會清空系統中所有的紀錄，並且同步刪除您的雲端備份，此操作無法復原。</p>
                <div class="flex gap-3">
                    <button id="cancelResetBtn" class="flex-1 bg-slate-100 hover:bg-slate-200 text-slate-700 font-medium py-2.5 rounded-xl transition-colors">取消</button>
                    <button id="confirmResetActionBtn" class="flex-1 bg-red-500 hover:bg-red-600 text-white font-medium py-2.5 rounded-xl transition-colors shadow-sm shadow-red-500/20">確定清除</button>
                </div>
            </div>
        </div>
    </div>

    <!-- 主內容區 -->
    <main class="max-w-7xl mx-auto p-4 sm:p-6 lg:p-8 mt-2">
        
        <!-- 系統訊息 -->
        <div id="systemMessage" class="hidden mb-6 p-4 rounded-xl text-sm font-medium border flex justify-between items-start gap-3 shadow-sm transition-all"></div>

        <!-- 階段二：直覺式搜尋 -->
        <div class="max-w-2xl mx-auto mb-8 relative z-20">
            <div class="relative group">
                <div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none">
                    <i data-lucide="search" class="w-6 h-6 text-slate-400 group-focus-within:text-blue-500 transition-colors"></i>
                </div>
                <input type="text" id="searchInput" placeholder="輸入客戶名稱或關鍵字 (例：陳院長、台積電)..." 
                    class="block w-full pl-12 pr-12 py-4 bg-white border border-slate-200 rounded-2xl shadow-sm text-lg focus:outline-none focus:ring-4 focus:ring-blue-500/20 focus:border-blue-500 transition-all placeholder-slate-400">
                <button id="clearSearchBtn" class="absolute inset-y-0 right-0 pr-4 flex items-center text-slate-400 hover:text-slate-600 hidden">
                    <i data-lucide="x-circle" class="w-6 h-6"></i>
                </button>
            </div>

            <!-- 下拉選單 (模糊比對) -->
            <div id="searchSuggestions" class="absolute w-full mt-2 bg-white rounded-xl shadow-xl border border-slate-100 hidden overflow-hidden divide-y divide-slate-50">
                <!-- 內容由 JS 動態生成 -->
            </div>
        </div>

        <!-- 初始空白狀態 -->
        <div id="mainEmptyState" class="flex flex-col items-center justify-center py-12 px-4 text-center">
            <div class="w-24 h-24 bg-blue-50 rounded-full flex items-center justify-center mb-6">
                <i data-lucide="file-search" class="w-12 h-12 text-blue-400"></i>
            </div>
            <h2 class="text-2xl font-bold text-slate-800 mb-2">準備就緒</h2>
            <p class="text-slate-500 max-w-md mx-auto">請先在上方搜尋框輸入客戶名稱查詢紀錄。<br>若需更新資料庫，請點擊右上角設定登入後台。</p>
        </div>

        <!-- 儀表板區域 (選定客戶後顯示) -->
        <div id="dashboardSection" class="hidden grid grid-cols-1 lg:grid-cols-12 gap-6 relative">
            
            <!-- 階段三：左側 - 客戶歷史明細列 (保留寬裕閱讀高度) -->
            <div class="lg:col-span-7 flex flex-col bg-white rounded-2xl shadow-sm border border-slate-200 overflow-hidden h-[550px] lg:h-[calc(100vh-180px)] lg:min-h-[650px]">
                
                <!-- 置頂控制列 (Sticky Header) -->
                <div class="sticky top-0 bg-white z-10 p-4 sm:p-5 border-b border-slate-100 flex flex-col sm:flex-row justify-between items-start sm:items-center gap-4 shadow-sm">
                    <div class="flex items-center gap-3">
                        <div class="bg-blue-100 text-blue-700 px-3 py-1 rounded-full text-sm font-semibold flex items-center gap-1.5">
                            <i data-lucide="history" class="w-4 h-4"></i>
                            <span id="recordCountBadge">0 筆紀錄</span>
                        </div>
                        <h2 id="currentTargetName" class="font-bold text-slate-800 truncate max-w-[200px]">客戶名稱</h2>
                    </div>
                    
                    <div class="flex items-center gap-2 w-full sm:w-auto overflow-x-auto no-scrollbar py-1">
                        <div class="flex items-center gap-2 bg-slate-50 px-3 py-2 rounded-lg border border-slate-200 shrink-0">
                            <i data-lucide="file-type-2" class="w-4 h-4 text-slate-400"></i>
                            <input type="number" id="wordLimitInput" value="50" min="10" max="500" class="w-12 bg-transparent text-center font-bold text-slate-700 focus:outline-none">
                            <span class="text-sm text-slate-500 font-medium">字</span>
                        </div>
                        
                        <!-- 喚出草稿按鈕 (隱藏，直到有第一份草稿) -->
                        <button id="viewDraftsBtn" class="hidden shrink-0 bg-indigo-50 hover:bg-indigo-100 text-indigo-700 font-medium py-2 px-3 sm:px-4 rounded-lg transition-colors flex items-center justify-center gap-1 sm:gap-2 border border-indigo-200 active:scale-95">
                            <i data-lucide="eye" class="w-4 h-4"></i>
                            <span class="hidden sm:inline">草稿</span>
                            <span class="sm:hidden">查看</span>
                            (<span id="draftCountText">0</span>)
                        </button>

                        <button id="generateBtn" class="flex-1 sm:flex-none shrink-0 bg-blue-600 hover:bg-blue-700 text-white font-medium py-2 px-4 rounded-lg transition-colors flex items-center justify-center gap-2 shadow-sm shadow-blue-600/20 active:scale-95">
                            <i data-lucide="wand-2" class="w-4 h-4"></i>
                            <span>生成草稿</span>
                        </button>
                    </div>
                </div>

                <!-- 歷史明細列表 (Scrollable) -->
                <div id="historyListContainer" class="flex-1 overflow-y-auto p-4 sm:p-6 space-y-4 bg-slate-50/50 no-scrollbar">
                    <!-- 卡片由 JS 產生 -->
                </div>
            </div>

            <!-- 階段四：右側 / 手機 Bottom Sheet - AI 產出結果區 -->
            <div id="aiPanelOverlay" class="fixed inset-0 bg-slate-900/40 z-40 hidden lg:hidden backdrop-blur-sm transition-opacity"></div>
            
            <div id="aiPanel" class="fixed inset-x-0 bottom-0 transform translate-y-full lg:static lg:translate-y-0 lg:col-span-5 bg-white rounded-t-3xl lg:rounded-2xl shadow-[0_-10px_40px_rgba(0,0,0,0.1)] lg:shadow-sm border border-slate-200 transition-transform duration-300 ease-out z-50 h-[85vh] lg:h-[calc(100vh-180px)] lg:min-h-[650px] flex flex-col flex-1">
                
                <!-- 手機版滑動把手 -->
                <div id="swipeHandle" class="w-full flex justify-center pt-3 pb-1 lg:hidden cursor-pointer touch-none">
                    <div class="w-12 h-1.5 bg-slate-200 rounded-full"></div>
                </div>

                <div class="px-5 py-3 lg:p-5 border-b border-slate-100 flex justify-between items-center bg-white rounded-t-3xl lg:rounded-t-2xl shrink-0">
                    <h3 class="font-bold text-slate-800 flex items-center gap-2">
                        <div class="w-8 h-8 rounded-full bg-blue-50 flex items-center justify-center">
                            <i data-lucide="bot" class="w-5 h-5 text-blue-600"></i>
                        </div>
                        AI 撰寫草稿
                    </h3>
                    
                    <div class="flex items-center gap-2">
                        <button id="copyBtn" class="hidden px-3 py-1.5 bg-slate-100 hover:bg-slate-200 text-slate-700 text-sm font-medium rounded-lg transition-colors flex items-center gap-1.5">
                            <i data-lucide="copy-check" class="w-4 h-4"></i> <span>複製全部</span>
                        </button>
                        <button id="closeAiPanelBtn" class="lg:hidden p-2 text-slate-400 hover:bg-slate-100 rounded-full transition-colors">
                            <i data-lucide="chevron-down" class="w-6 h-6"></i>
                        </button>
                    </div>
                </div>

                <!-- 允許無限往下新增草稿的滾動區塊 -->
                <div id="aiOutput" class="flex-1 overflow-y-auto p-5 relative no-scrollbar">
                    
                    <div id="aiEmptyState" class="absolute inset-0 flex flex-col items-center justify-center text-slate-400 p-6 text-center">
                        <i data-lucide="sparkles" class="w-12 h-12 mb-3 opacity-30"></i>
                        <p class="text-sm">點擊左側的「生成草稿」按鈕<br>AI 將依據字數限制為您精煉重點。</p>
                    </div>

                    <!-- 這裡會由 JS 動態新增 loading 與各個草稿版本 -->
                </div>
            </div>
        </div>
    </main>

    <!-- Firebase 雲端與帳號模組 -->
    <script>
        const __firebase_config = JSON.stringify({
            apiKey: "AIzaSyC9fwzIsYtnnzzC5Un9u6HTsK3lR1RDhaA",
            authDomain: "clientvisitdb.firebaseapp.com",
            projectId: "clientvisitdb",
            storageBucket: "clientvisitdb.firebasestorage.app",
            messagingSenderId: "158448570433",
            appId: "1:158448570433:web:44e1f6c96cd1823aa936c0"
        });
        const __app_id = "smart_visit_ai_assistant_v1";
        const fallbackApiKey = ""; // 系統預設環境 API Key 備用
    </script>
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, signInAnonymously, onAuthStateChanged, signInWithEmailAndPassword, signOut } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore, doc, setDoc, getDoc, deleteDoc } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        let db, auth;

        try {
            if (typeof __firebase_config !== 'undefined' && __firebase_config) {
                const firebaseConfig = JSON.parse(__firebase_config);
                const appId = typeof __app_id !== 'undefined' ? __app_id : 'default-app-id';
                
                const app = initializeApp(firebaseConfig);
                auth = getAuth(app);
                db = getFirestore(app);

                const initAuth = async () => {
                    try {
                        await signInAnonymously(auth);
                    } catch (err) {
                        setTimeout(() => {
                            if (window.showMsg) {
                                if (err.message && err.message.includes('requests-from-referer')) {
                                    window.showMsg("系統連線被阻擋：API 金鑰限制了網域。<br>請至 Google Cloud Console 將 <b>*.scf.usercontent.goog/*</b> 加入允許清單，並等待 5 分鐘後重整網頁。", "error");
                                } else if (err.code === 'auth/operation-not-allowed') {
                                    window.showMsg("系統連線失敗：尚未啟用「匿名」登入。<br>請至 Firebase 控制台 > Authentication > 登入方式，將「匿名」設為啟用。", "error");
                                }
                            }
                        }, 500);
                    }
                };
                initAuth();

                // 供外部呼叫的登入/登出函式
                window.adminLogin = async (email, password) => {
                    return await signInWithEmailAndPassword(auth, email, password);
                };
                
                window.adminLogout = async () => {
                    await signOut(auth);
                    await initAuth(); 
                };

                window.isUserAdmin = () => {
                    return auth.currentUser && !auth.currentUser.isAnonymous && auth.currentUser.email;
                };

                onAuthStateChanged(auth, async (user) => {
                    const statusBadge = document.getElementById('authStatusBadge');
                    const cloudBackupStatus = document.getElementById('cloudBackupStatus');
                    
                    if (user) {
                        window.__firebase_user_id = user.uid;
                        window.__firebase_db = db;
                        window.__firebase_app_id = appId;

                        const isAdmin = !user.isAnonymous && user.email;
                        const displayId = isAdmin ? user.email : user.uid.substring(0,6) + '...';

                        // 設定面板 Badge
                        statusBadge.className = `flex items-center gap-2 px-3 py-2 rounded-lg text-sm font-medium border break-all ${isAdmin ? 'bg-blue-50 text-blue-700 border-blue-200' : 'bg-green-50 text-green-700 border-green-200'}`;
                        statusBadge.innerHTML = `<i data-lucide="${isAdmin ? 'shield-check' : 'user'}" class="w-4 h-4 shrink-0"></i> ${isAdmin ? '管理員連線中' : '訪客連線'} (${displayId})`;
                        
                        // 首頁膠囊 Badge - 雲端狀態
                        if (isAdmin) {
                            cloudBackupStatus.className = "flex items-center gap-2 px-4 py-1.5 bg-green-50 border border-green-200 rounded-full text-sm font-medium text-green-700 shadow-sm transition-colors";
                            cloudBackupStatus.innerHTML = `<i data-lucide="cloud-check" class="w-4 h-4"></i> <span>雲端備份：已連線</span>`;
                        } else {
                            cloudBackupStatus.className = "flex items-center gap-2 px-4 py-1.5 bg-slate-50 border border-slate-200 rounded-full text-sm font-medium text-slate-500 shadow-sm transition-colors";
                            cloudBackupStatus.innerHTML = `<i data-lucide="cloud-off" class="w-4 h-4"></i> <span>雲端備份：訪客 (未同步)</span>`;
                        }
                        
                        // 控制登出按鈕顯示與否
                        const logoutBtn = document.getElementById('logoutBtn');
                        if (logoutBtn) {
                            if (isAdmin) logoutBtn.classList.remove('hidden');
                            else logoutBtn.classList.add('hidden');
                        }
                        lucide.createIcons();

                        // 載入 API Key
                        try {
                            const keyRef = doc(db, 'artifacts', appId, 'users', user.uid, 'settings', 'apikey');
                            const keySnap = await getDoc(keyRef);
                            if (keySnap.exists() && keySnap.data().key) {
                                document.getElementById('customApiKey').value = keySnap.data().key;
                            }
                        } catch(e) {}

                        // 載入 Excel 備份 (Chunking 讀取)
                        try {
                            const metaRef = doc(db, 'artifacts', appId, 'users', user.uid, 'settings', 'excel_meta');
                            const metaSnap = await getDoc(metaRef);
                            if (metaSnap.exists() && metaSnap.data().chunks) {
                                document.getElementById('fileStatus').classList.remove('hidden');
                                document.getElementById('fileStatus').innerHTML = `<i data-lucide="loader-2" class="w-4 h-4 animate-spin shrink-0"></i> <span>正在從雲端載入資料...</span>`;
                                
                                if (isAdmin) {
                                    cloudBackupStatus.innerHTML = `<i data-lucide="loader-2" class="w-4 h-4 animate-spin"></i> <span>雲端備份：同步中...</span>`;
                                    lucide.createIcons();
                                }

                                const chunksCount = metaSnap.data().chunks;
                                let combinedData = [];
                                for (let i = 0; i < chunksCount; i++) {
                                    const chunkRef = doc(db, 'artifacts', appId, 'users', user.uid, 'excel_chunks', `chunk_${i}`);
                                    const chunkSnap = await getDoc(chunkRef);
                                    if (chunkSnap.exists() && chunkSnap.data().data) {
                                        combinedData = combinedData.concat(JSON.parse(chunkSnap.data().data));
                                    }
                                }
                                if (combinedData.length > 0 && window.onExcelLoaded) {
                                    window.onExcelLoaded(combinedData, true);
                                    if (isAdmin) {
                                        cloudBackupStatus.className = "flex items-center gap-2 px-4 py-1.5 bg-green-50 border border-green-200 rounded-full text-sm font-medium text-green-700 shadow-sm transition-colors";
                                        cloudBackupStatus.innerHTML = `<i data-lucide="cloud-check" class="w-4 h-4"></i> <span>雲端備份：已同步</span>`;
                                        lucide.createIcons();
                                    }
                                }
                            }
                        } catch(e) {
                            console.error("Cloud fetch error:", e);
                            if (isAdmin) {
                                cloudBackupStatus.className = "flex items-center gap-2 px-4 py-1.5 bg-red-50 border border-red-200 rounded-full text-sm font-medium text-red-700 shadow-sm transition-colors";
                                cloudBackupStatus.innerHTML = `<i data-lucide="cloud-off" class="w-4 h-4"></i> <span>雲端備份：讀取失敗 (請檢查資料庫設定)</span>`;
                                lucide.createIcons();
                            }
                        }

                    } else {
                        statusBadge.className = "flex items-center gap-2 px-3 py-2 rounded-lg text-sm font-medium bg-red-50 text-red-700 border border-red-200";
                        statusBadge.innerHTML = `<i data-lucide="alert-circle" class="w-4 h-4"></i> 離線狀態`;
                        
                        cloudBackupStatus.className = "flex items-center gap-2 px-4 py-1.5 bg-red-50 border border-red-200 rounded-full text-sm font-medium text-red-700 shadow-sm transition-colors";
                        cloudBackupStatus.innerHTML = `<i data-lucide="cloud-off" class="w-4 h-4"></i> <span>雲端備份：離線</span>`;
                        lucide.createIcons();
                    }
                });

                // 全域寫入函式
                window.saveToCloud = async (collectionName, docId, data) => {
                    if (!window.__firebase_user_id) return { success: false };
                    try {
                        const dRef = doc(db, 'artifacts', window.__firebase_app_id, 'users', window.__firebase_user_id, collectionName, docId);
                        await setDoc(dRef, data);
                        return { success: true };
                    } catch(e) {
                        console.error("Save error:", e);
                        return { success: false };
                    }
                };

                window.deleteFromCloud = async (collectionName, docId) => {
                     if (!window.__firebase_user_id) return { success: false };
                     try {
                        await deleteDoc(doc(db, 'artifacts', window.__firebase_app_id, 'users', window.__firebase_user_id, collectionName, docId));
                        return { success: true };
                     } catch(e) { return { success: false }; }
                };

                // 將完整清除資料的邏輯整合在有 Firebase 權限的模組內
                window.clearAllCloudData = async () => {
                     if (!window.__firebase_user_id) return { success: false };
                     try {
                         const metaRef = doc(db, 'artifacts', window.__firebase_app_id, 'users', window.__firebase_user_id, 'settings', 'excel_meta');
                         const metaSnap = await getDoc(metaRef);
                         if(metaSnap.exists() && metaSnap.data().chunks) {
                             const chunks = metaSnap.data().chunks;
                             for(let i=0; i<chunks; i++){
                                 await deleteDoc(doc(db, 'artifacts', window.__firebase_app_id, 'users', window.__firebase_user_id, 'excel_chunks', `chunk_${i}`));
                             }
                         }
                         await deleteDoc(metaRef);
                         return { success: true };
                     } catch(e) { return { success: false }; }
                };
            }
        } catch (error) {
            // Error caught to prevent black box
        }
    </script>

    <!-- 主應用邏輯 -->
    <script>
        lucide.createIcons();

        // 狀態變數
        let globalExcelData = [];
        let currentTargets = [];
        let targetRecords = [];
        let validProductsSet = new Set();
        window.currentDraftCount = 0; // 用於追蹤當前客戶生成的草稿數量

        // DOM 元素
        const els = {
            homeBtn: document.getElementById('homeBtn'),
            settingsDrawer: document.getElementById('settingsDrawer'),
            settingsOverlay: document.getElementById('settingsOverlay'),
            openSettingsBtn: document.getElementById('openSettingsBtn'),
            closeSettingsBtn: document.getElementById('closeSettingsBtn'),
            saveSettingsBtn: document.getElementById('saveSettingsBtn'),
            logoutBtn: document.getElementById('logoutBtn'),
            
            loginModalOverlay: document.getElementById('loginModalOverlay'),
            closeLoginBtn: document.getElementById('closeLoginBtn'),
            confirmLoginBtn: document.getElementById('confirmLoginBtn'),
            loginEmail: document.getElementById('loginEmail'),
            loginPassword: document.getElementById('loginPassword'),
            loginErrorMsg: document.getElementById('loginErrorMsg'),
            loginErrorText: document.getElementById('loginErrorText'),
            
            localMemoryStatus: document.getElementById('localMemoryStatus'),
            cloudBackupStatus: document.getElementById('cloudBackupStatus'),
            
            searchInput: document.getElementById('searchInput'),
            clearSearchBtn: document.getElementById('clearSearchBtn'),
            searchSuggestions: document.getElementById('searchSuggestions'),
            mainEmptyState: document.getElementById('mainEmptyState'),
            dashboardSection: document.getElementById('dashboardSection'),
            
            currentTargetName: document.getElementById('currentTargetName'),
            recordCountBadge: document.getElementById('recordCountBadge'),
            historyListContainer: document.getElementById('historyListContainer'),
            
            wordLimitInput: document.getElementById('wordLimitInput'),
            generateBtn: document.getElementById('generateBtn'),
            viewDraftsBtn: document.getElementById('viewDraftsBtn'),
            draftCountText: document.getElementById('draftCountText'),
            
            aiPanel: document.getElementById('aiPanel'),
            aiPanelOverlay: document.getElementById('aiPanelOverlay'),
            closeAiPanelBtn: document.getElementById('closeAiPanelBtn'),
            aiEmptyState: document.getElementById('aiEmptyState'),
            aiOutput: document.getElementById('aiOutput'),
            copyBtn: document.getElementById('copyBtn'),
            swipeHandle: document.getElementById('swipeHandle'),

            fileInput: document.getElementById('excelFile'),
            fileStatus: document.getElementById('fileStatus'),
            systemMessage: document.getElementById('systemMessage'),
            customApiKey: document.getElementById('customApiKey'),
            exportBtn: document.getElementById('exportBtn'),
            resetDataBtn: document.getElementById('resetDataBtn')
        };

        // 綁定回首頁事件
        if (els.homeBtn) els.homeBtn.addEventListener('click', () => { if (typeof window.resetApp === 'function') window.resetApp(); });

        // UI 輔助函式
        window.showMsg = function(msg, type = 'error') {
            els.systemMessage.className = `mb-6 p-4 rounded-xl text-sm font-medium border flex justify-between items-start gap-3 shadow-sm transition-all ${
                type === 'error' ? 'bg-red-50 text-red-700 border-red-200' : 
                type === 'success' ? 'bg-green-50 text-green-700 border-green-200' : 
                'bg-blue-50 text-blue-700 border-blue-200'
            }`;
            els.systemMessage.innerHTML = `<div class="flex-1">${msg}</div><button onclick="this.parentElement.classList.add('hidden')" class="shrink-0 opacity-50 hover:opacity-100"><i data-lucide="x" class="w-4 h-4"></i></button>`;
            lucide.createIcons();
            els.systemMessage.classList.remove('hidden');
        };

        function cleanStr(str) {
            if (!str) return "";
            return String(str).replace(/[^\x20-\x7E\u4E00-\u9FFF\u3000-\u303F\uFF00-\uFFEF\n\r\t]/g, " ").trim();
        }
        
        window.clearLocalMemory = () => {
            globalExcelData = [];
            validProductsSet.clear();
            if (typeof window.resetApp === 'function') window.resetApp();
            els.fileStatus.classList.add('hidden');
            els.fileInput.value = '';
            
            if (els.localMemoryStatus) {
                els.localMemoryStatus.className = "flex items-center gap-2 px-4 py-1.5 bg-slate-50 border border-slate-200 rounded-full text-sm font-medium text-slate-600 shadow-sm transition-colors";
                els.localMemoryStatus.innerHTML = `<i data-lucide="smartphone" class="w-4 h-4"></i> <span>本機記憶：無資料</span>`;
            }
            lucide.createIcons();
        };

        // --- 登入與設定面板控制 ---
        
        // 點擊設定按鈕：檢查權限，若非管理員則跳出登入視窗
        els.openSettingsBtn.addEventListener('click', () => {
            if (window.isUserAdmin && window.isUserAdmin()) {
                toggleSettings(true); // 已經是管理員，直接進入後台
            } else {
                els.loginModalOverlay.classList.remove('hidden'); // 跳出登入視窗
            }
        });

        els.closeLoginBtn.addEventListener('click', () => {
            els.loginModalOverlay.classList.add('hidden');
        });

        // 執行登入
        els.confirmLoginBtn.addEventListener('click', async () => {
            const email = els.loginEmail.value.trim();
            const password = els.loginPassword.value.trim();
            
            if (!email || !password) {
                els.loginErrorText.textContent = "請輸入帳號與密碼";
                els.loginErrorMsg.classList.remove('hidden');
                return;
            }

            els.loginErrorMsg.classList.add('hidden');
            els.confirmLoginBtn.disabled = true;
            els.confirmLoginBtn.innerHTML = `<i data-lucide="loader-2" class="w-5 h-5 animate-spin mx-auto"></i>`;
            lucide.createIcons();

            try {
                if (window.adminLogin) {
                    await window.adminLogin(email, password);
                    els.loginModalOverlay.classList.add('hidden');
                    els.loginEmail.value = '';
                    els.loginPassword.value = '';
                    toggleSettings(true); // 登入成功，開啟後台
                    window.showMsg("登入成功，歡迎進入管理員後台", "success");
                }
            } catch (err) {
                if (err.message && err.message.includes('requests-from-referer')) {
                    els.loginErrorText.innerHTML = "登入失敗：API 金鑰限制了網域。<br>請至 Google Cloud Console 允許 <b>*.scf.usercontent.goog/*</b> 連線。";
                } else if (err.code === 'auth/operation-not-allowed') {
                    els.loginErrorText.innerHTML = "登入失敗：尚未啟用帳密登入。<br>請至 Firebase 將「電子郵件/密碼」設為啟用。";
                } else if (err.code === 'auth/invalid-credential') {
                    els.loginErrorText.textContent = "登入失敗：帳號或密碼錯誤。";
                } else {
                    els.loginErrorText.textContent = "登入失敗：" + (err.code || "發生未知錯誤");
                }
                els.loginErrorMsg.classList.remove('hidden');
            } finally {
                els.confirmLoginBtn.disabled = false;
                els.confirmLoginBtn.innerHTML = `安全登入`;
            }
        });

        // 登出管理員
        els.logoutBtn.addEventListener('click', async () => {
            if (window.adminLogout) {
                await window.adminLogout();
                toggleSettings(false);
                window.showMsg("已登出管理員，返回訪客模式", "success");
                window.clearLocalMemory(); 
            }
        });

        const toggleSettings = (show) => {
            if (show) {
                els.settingsOverlay.classList.remove('hidden');
                els.settingsDrawer.classList.remove('translate-x-full');
            } else {
                els.settingsDrawer.classList.add('translate-x-full');
                setTimeout(() => els.settingsOverlay.classList.add('hidden'), 300);
                
                // 儲存 API Key 至雲端
                const key = els.customApiKey.value.trim();
                if (key && window.saveToCloud) {
                    window.saveToCloud('settings', 'apikey', { key });
                } else if (!key && window.deleteFromCloud) {
                    window.deleteFromCloud('settings', 'apikey');
                }
            }
        };

        els.closeSettingsBtn.addEventListener('click', () => toggleSettings(false));
        els.settingsOverlay.addEventListener('click', () => toggleSettings(false));
        els.saveSettingsBtn.addEventListener('click', () => toggleSettings(false));

        // 處理 Excel
        window.onExcelLoaded = async (data, isFromCloud = false) => {
            globalExcelData = data;
            
            // 建立真實產品庫
            validProductsSet.clear();
            globalExcelData.forEach(row => {
                for (const [k, v] of Object.entries(row)) {
                    if ((String(k).includes('產品') || String(k).includes('品項')) && v) {
                        String(v).split(/[,、，/+\s]+/).forEach(p => {
                            let cleanP = cleanStr(p);
                            if (cleanP && cleanP.length <= 25) validProductsSet.add(cleanP);
                        });
                    }
                }
            });

            // 更新設定面板狀態
            els.fileStatus.classList.remove('hidden');
            els.fileStatus.innerHTML = `
                <i data-lucide="check-circle-2" class="w-4 h-4 shrink-0 mt-0.5"></i>
                <div class="flex-1">
                    <p class="font-bold">成功載入 ${data.length} 筆資料</p>
                    <p class="text-green-600/80 mt-0.5">已提取 ${validProductsSet.size} 項真實產品以防 AI 幻覺</p>
                    ${isFromCloud ? '<p class="text-blue-600 mt-0.5">☁️ 來自雲端備份</p>' : ''}
                </div>`;
                
            // 首頁膠囊更新
            els.localMemoryStatus.className = "flex items-center gap-2 px-4 py-1.5 bg-blue-50 border border-blue-200 rounded-full text-sm font-medium text-blue-700 shadow-sm transition-colors";
            els.localMemoryStatus.innerHTML = `<i data-lucide="smartphone" class="w-4 h-4"></i> <span>本機記憶：${data.length} 筆</span>`;
            lucide.createIcons();

            // 上傳到雲端 (Chunking)
            if (!isFromCloud && window.saveToCloud && window.isUserAdmin && window.isUserAdmin()) {
                const cloudBackupStatus = document.getElementById('cloudBackupStatus');
                if (cloudBackupStatus) {
                    cloudBackupStatus.className = "flex items-center gap-2 px-4 py-1.5 bg-blue-50 border border-blue-200 rounded-full text-sm font-medium text-blue-700 shadow-sm transition-colors";
                    cloudBackupStatus.innerHTML = `<i data-lucide="loader-2" class="w-4 h-4 animate-spin"></i> <span>雲端備份：同步中...</span>`;
                    lucide.createIcons();
                }

                const CHUNK_SIZE = 500;
                const totalChunks = Math.ceil(data.length / CHUNK_SIZE);
                let uploadSuccess = true;
                
                const metaRes = await window.saveToCloud('settings', 'excel_meta', { chunks: totalChunks, totalRows: data.length });
                if (!metaRes.success) uploadSuccess = false;

                if (uploadSuccess) {
                    for (let i = 0; i < totalChunks; i++) {
                        const chunkData = data.slice(i * CHUNK_SIZE, (i + 1) * CHUNK_SIZE);
                        if (new Blob([JSON.stringify(chunkData)]).size <= 900000) {
                             const chunkRes = await window.saveToCloud('excel_chunks', `chunk_${i}`, { data: JSON.stringify(chunkData) });
                             if (!chunkRes.success) {
                                 uploadSuccess = false;
                                 break;
                             }
                        }
                    }
                }

                if (cloudBackupStatus) {
                    if (uploadSuccess) {
                        cloudBackupStatus.className = "flex items-center gap-2 px-4 py-1.5 bg-green-50 border border-green-200 rounded-full text-sm font-medium text-green-700 shadow-sm transition-colors";
                        cloudBackupStatus.innerHTML = `<i data-lucide="cloud-check" class="w-4 h-4"></i> <span>雲端備份：已同步</span>`;
                    } else {
                        cloudBackupStatus.className = "flex items-center gap-2 px-4 py-1.5 bg-red-50 border border-red-200 rounded-full text-sm font-medium text-red-700 shadow-sm transition-colors";
                        cloudBackupStatus.innerHTML = `<i data-lucide="cloud-off" class="w-4 h-4"></i> <span>雲端備份：同步失敗 (請檢查資料庫設定)</span>`;
                    }
                    lucide.createIcons();
                }
            }
        };

        els.fileInput.addEventListener('change', (e) => {
            const file = e.target.files[0];
            if (!file) return;
            els.fileStatus.classList.remove('hidden');
            els.fileStatus.innerHTML = `<i data-lucide="loader-2" class="w-4 h-4 animate-spin shrink-0"></i> <span>解析檔案中...</span>`;
            
            els.localMemoryStatus.innerHTML = `<i data-lucide="loader-2" class="w-4 h-4 animate-spin text-slate-400"></i> <span>本機記憶：解析中...</span>`;
            lucide.createIcons();

            const reader = new FileReader();
            reader.onload = (event) => {
                try {
                    const workbook = XLSX.read(new Uint8Array(event.target.result), { type: 'array' });
                    const data = XLSX.utils.sheet_to_json(workbook.Sheets[workbook.SheetNames[0]], { defval: "" });
                    window.onExcelLoaded(data, false);
                } catch (err) {
                    window.showMsg("Excel 解析失敗，請確認格式", "error");
                    els.fileStatus.classList.add('hidden');
                    els.localMemoryStatus.innerHTML = `<i data-lucide="alert-triangle" class="w-4 h-4 text-red-500"></i> <span>本機記憶：解析失敗</span>`;
                    lucide.createIcons();
                }
            };
            reader.readAsArrayBuffer(file);
        });

        // 搜尋與選單邏輯
        els.searchInput.addEventListener('input', (e) => {
            const val = e.target.value.trim().toLowerCase();
            if (val) els.clearSearchBtn.classList.remove('hidden');
            else els.clearSearchBtn.classList.add('hidden');

            if (!val || globalExcelData.length === 0) {
                els.searchSuggestions.classList.add('hidden');
                return;
            }

            const matches = new Set();
            globalExcelData.forEach(row => {
                for (const [key, v] of Object.entries(row)) {
                    if (key.startsWith('__EMPTY') || !v) continue;
                    const strVal = String(v).trim();
                    if (strVal.toLowerCase().includes(val) && strVal.length < 30) {
                        matches.add(strVal);
                    }
                }
            });

            const topMatches = Array.from(matches).sort((a,b) => a.length - b.length).slice(0, 5);
            
            if (topMatches.length > 0) {
                let html = '<div class="p-3 text-sm font-medium text-slate-500 border-b border-slate-50 bg-slate-50/50">請勾選目標客戶 (可多選)：</div><div class="max-h-60 overflow-y-auto">';
                topMatches.forEach(match => {
                    const regex = new RegExp(`(${val})`, 'gi');
                    const highlighted = match.replace(regex, '<span class="text-blue-600 font-bold bg-blue-50">$1</span>');
                    html += `
                        <label class="flex items-center gap-3 px-4 py-3 hover:bg-slate-50 cursor-pointer border-b border-slate-50 last:border-0 transition-colors">
                            <input type="checkbox" value="${match}" class="target-checkbox w-4 h-4 text-blue-600 focus:ring-blue-500 rounded border-slate-300 cursor-pointer">
                            <span class="text-slate-700 flex-1">${highlighted}</span>
                        </label>`;
                });
                html += `</div>
                <div class="p-3 bg-white border-t border-slate-100">
                    <button id="confirmSelectionBtn" class="w-full bg-blue-600 hover:bg-blue-700 text-white font-medium py-2.5 rounded-lg transition-colors shadow-sm active:scale-[0.98]">
                        確認選擇
                    </button>
                </div>`;
                
                els.searchSuggestions.innerHTML = html;
                els.searchSuggestions.classList.remove('hidden');
                lucide.createIcons();

                document.getElementById('confirmSelectionBtn').addEventListener('click', () => {
                    const checkedBoxes = document.querySelectorAll('.target-checkbox:checked');
                    if (checkedBoxes.length > 0) {
                        const selectedNames = Array.from(checkedBoxes).map(cb => cb.value);
                        selectMultipleTargets(selectedNames);
                    } else {
                        window.showMsg("請至少勾選一個客戶", "error");
                    }
                });
            } else {
                els.searchSuggestions.classList.add('hidden');
            }
        });

        window.resetApp = function() {
            els.searchInput.value = '';
            els.clearSearchBtn.classList.add('hidden');
            els.searchSuggestions.classList.add('hidden');
            els.dashboardSection.classList.add('hidden');
            els.mainEmptyState.classList.remove('hidden');
            currentTargets = [];
            targetRecords = [];
            window.currentDraftCount = 0;
            if (els.viewDraftsBtn) els.viewDraftsBtn.classList.add('hidden');
            closeAiPanel();
        }

        els.clearSearchBtn.addEventListener('click', window.resetApp);

        // 選擇目標並渲染儀表板
        function selectMultipleTargets(names) {
            const joinedNames = names.join('、');
            els.searchInput.value = joinedNames;
            els.searchSuggestions.classList.add('hidden');
            currentTargets = names;
            
            // 重置草稿狀態
            window.currentDraftCount = 0;
            if (els.viewDraftsBtn) els.viewDraftsBtn.classList.add('hidden');
            
            // 為了保留舊草稿，不再清除整個 aiOutput 的內容，只清除掉之前的舊資料
            Array.from(els.aiOutput.children).forEach(child => {
                if (child.id !== 'aiEmptyState') {
                    child.remove();
                }
            });
            
            targetRecords = globalExcelData.filter(row => 
                Object.values(row).some(v => {
                    const strV = String(v).toLowerCase();
                    return names.some(name => strV.includes(name.toLowerCase()));
                })
            ).reverse(); 

            if (targetRecords.length > 0) {
                els.mainEmptyState.classList.add('hidden');
                els.dashboardSection.classList.remove('hidden');
                
                els.currentTargetName.textContent = joinedNames;
                els.recordCountBadge.textContent = `${targetRecords.length} 筆紀錄`;
                
                let listHtml = '';
                targetRecords.forEach((row, i) => {
                    let card = `<div class="bg-white rounded-xl p-4 sm:p-5 shadow-[0_2px_10px_rgba(0,0,0,0.04)] border border-slate-100 hover:border-blue-200 transition-colors space-y-3">
                        <div class="flex items-center gap-2 mb-2 pb-2 border-b border-slate-50">
                            <span class="flex items-center justify-center w-6 h-6 rounded-full bg-blue-100 text-blue-700 text-xs font-bold">${targetRecords.length - i}</span>
                            <span class="text-xs font-semibold text-slate-400 uppercase tracking-wider">Historical Record</span>
                        </div>`;
                    
                    for (const [k, v] of Object.entries(row)) {
                        if (k && !k.startsWith('__EMPTY') && v) {
                            card += `
                                <div class="flex flex-col sm:flex-row sm:gap-4">
                                    <span class="text-xs sm:text-sm font-medium text-slate-400 min-w-[80px] shrink-0 mt-0.5">${cleanStr(k)}</span>
                                    <span class="text-sm sm:text-base text-slate-700 break-words leading-relaxed">${cleanStr(v)}</span>
                                </div>`;
                        }
                    }
                    card += `</div>`;
                    listHtml += card;
                });
                els.historyListContainer.innerHTML = listHtml;
                
                els.aiEmptyState.classList.remove('hidden');
                els.copyBtn.classList.add('hidden');
                
                // 自動向下捲動，保留視覺焦點給閱讀區塊
                setTimeout(() => {
                    const yOffset = els.dashboardSection.getBoundingClientRect().top + window.scrollY - 80;
                    window.scrollTo({ top: yOffset, behavior: 'smooth' });
                }, 100);
            } else {
                window.showMsg("找不到相關紀錄", "error");
                window.resetApp();
            }
        }

        // Bottom Sheet 控制
        function openAiPanel() {
            els.aiPanel.classList.remove('translate-y-full');
            els.aiPanelOverlay.classList.remove('hidden');
        }
        function closeAiPanel() {
            els.aiPanel.classList.add('translate-y-full');
            setTimeout(() => els.aiPanelOverlay.classList.add('hidden'), 300);
        }
        
        els.closeAiPanelBtn.addEventListener('click', closeAiPanel);
        els.aiPanelOverlay.addEventListener('click', closeAiPanel);
        
        // 點擊「查看草稿」按鈕直接開啟面板
        if (els.viewDraftsBtn) {
            els.viewDraftsBtn.addEventListener('click', openAiPanel);
        }

        let touchStartY = 0;
        els.swipeHandle.addEventListener('touchstart', e => touchStartY = e.touches[0].clientY);
        els.swipeHandle.addEventListener('touchmove', e => {
            const currentY = e.touches[0].clientY;
            if (currentY - touchStartY > 50) closeAiPanel();
        });

        // 打字機效果實作 (修改為針對特定容器)
        async function typeWriterEffect(markdownText, targetElement) {
            let currentText = '';
            return new Promise(resolve => {
                let i = 0;
                const timer = setInterval(() => {
                    const char = markdownText.charAt(i);
                    currentText += char;
                    
                    targetElement.innerHTML = marked.parse(currentText);
                    els.aiOutput.scrollTop = els.aiOutput.scrollHeight; 
                    
                    i++;
                    if (i >= markdownText.length) {
                        clearInterval(timer);
                        resolve();
                    }
                }, 10); 
            });
        }

        // 執行 AI 生成
        els.generateBtn.addEventListener('click', async () => {
            const effectiveApiKey = els.customApiKey.value.trim() || fallbackApiKey;

            if (!effectiveApiKey) {
                if (window.isUserAdmin && window.isUserAdmin()) toggleSettings(true);
                else document.getElementById('loginModalOverlay').classList.remove('hidden');
                return window.showMsg("請先登入後台並在設定面板填入 Gemini API Key", "error");
            }

            const wordLimit = parseInt(els.wordLimitInput.value) || 50;
            
            // 縮減歷史紀錄到最多 3 筆，並裁切每欄位至 150 字
            const maxRecords = Math.min(targetRecords.length, 3);
            let historyText = "";
            for(let i=0; i<maxRecords; i++){
                historyText += `[紀錄${i+1}]:\n`;
                for (const [k, v] of Object.entries(targetRecords[i])) {
                     if (k && !k.startsWith('__EMPTY') && v) historyText += `${cleanStr(k)}:${cleanStr(v).substring(0, 150)}\n`;
                }
            }

            const validProductsStr = Array.from(validProductsSet).join('、');
            const targetNameStr = currentTargets.join('、');

            const prompt = `你是一位高階業務經理。請根據以下歷史紀錄，為客戶「${targetNameStr}」擬定「下次拜訪草稿」。
            
【絕對限制與格式要求】：
1. 產品數量：請先計算【歷史紀錄】中出現的不同產品總數。如果超過 3 個不同的產品，請「隨機挑選 3 個」；如果為 3 個(含)以內，請挑選「2 個」(若紀錄中只有 1 個則挑選 1 個)。產品名稱請合併寫在同一行。
2. 說明合併與字數限制：請將您挑選出的產品說明，流暢地合併為「單一段落文字」，絕對不要分段或使用條列式！這段「說明」的總字數必須嚴格限制在 ${wordLimit} 字以內，請高度精煉。
3. 輸出格式：請嚴格遵守以下格式輸出，不要加任何其他標題或廢話。

客戶名稱：${targetNameStr}
產品名稱：[您挑選的產品A、產品B...]
說明：[合併成單一段落的精煉說明]

【公司現有產品清單】：
${validProductsStr || '僅限歷史紀錄出現過之產品'}

【歷史紀錄】：
${historyText}

請依照上述格式，直接輸出下次拜訪草稿內容：`;

            openAiPanel();
            els.aiEmptyState.classList.add('hidden');
            
            // 建立動態 Loading 狀態 (直接塞進列表最下方)
            const loadingId = 'loading-' + Date.now();
            const loadingDiv = document.createElement('div');
            loadingDiv.id = loadingId;
            loadingDiv.className = "flex flex-col items-center justify-center py-10 bg-slate-50/50 rounded-xl border border-slate-100 mb-6";
            els.aiOutput.appendChild(loadingDiv);
            els.aiOutput.scrollTop = els.aiOutput.scrollHeight;
            
            els.generateBtn.disabled = true;
            els.generateBtn.innerHTML = `<i data-lucide="loader-2" class="w-4 h-4 animate-spin"></i> 處理中`;
            lucide.createIcons();

            try {
                let resultText = null;
                let lastError = null;
                
                for (let i = 0; i < 5; i++) {
                    try {
                        const loadingEl = document.getElementById(loadingId);
                        if (i === 0 && loadingEl) {
                            loadingEl.innerHTML = `
                                <div class="relative w-12 h-12 flex items-center justify-center mb-3">
                                    <div class="absolute inset-0 border-4 border-slate-200 rounded-full"></div>
                                    <div class="absolute inset-0 border-4 border-blue-500 rounded-full border-t-transparent animate-spin"></div>
                                    <i data-lucide="wand-2" class="w-5 h-5 text-blue-500 animate-pulse"></i>
                                </div>
                                <p class="text-blue-600 font-medium">正在為您萃取重點...</p>
                                <p class="text-slate-400 text-xs mt-1">嚴格遵守 ${wordLimit} 字限制中</p>
                            `;
                            lucide.createIcons();
                        } else if (i > 0) {
                            const waitSeconds = 10 + (i * 5); 
                            for (let s = waitSeconds; s > 0; s--) {
                                if(document.getElementById(loadingId)) {
                                    document.getElementById(loadingId).innerHTML = `
                                        <div class="relative w-12 h-12 flex items-center justify-center mb-3">
                                            <div class="absolute inset-0 border-4 border-slate-200 rounded-full"></div>
                                            <div class="absolute inset-0 border-4 border-amber-500 rounded-full border-t-transparent animate-spin"></div>
                                            <span class="text-amber-600 font-bold">${s}</span>
                                        </div>
                                        <p class="text-amber-600 font-medium">伺服器忙碌，倒數 ${s} 秒後重試 (${i}/5)...</p>
                                    `;
                                }
                                await new Promise(r => setTimeout(r, 1000));
                            }
                        }

                        const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash:generateContent?key=${effectiveApiKey}`, {
                            method: 'POST',
                            headers: { 'Content-Type': 'application/json' },
                            body: JSON.stringify({
                                contents: [{ parts: [{ text: prompt }] }],
                                systemInstruction: { parts: [{ text: "你是精簡扼要的業務策略AI。你必須嚴格依照要求的格式輸出：「客戶名稱：\\n產品名稱：\\n說明：」。說明部分必須合併為單一段落文字，並嚴格遵守字數限制。" }] }
                            })
                        });

                        if (response.status === 401) {
                            if (window.isUserAdmin && window.isUserAdmin()) toggleSettings(true);
                            throw new Error("API 金鑰無效，請確認設定。");
                        }

                        const data = await response.json();
                        if (!response.ok) throw new Error(data.error?.message || "伺服器錯誤");
                        
                        resultText = data.candidates?.[0]?.content?.parts?.[0]?.text;
                        if (resultText) break;
                    } catch (e) {
                        lastError = e;
                        const errMsg = e.message.toLowerCase();
                        if (e.message.includes("401") || e.message.includes("金鑰無效")) throw e;
                        if (errMsg.includes("quota")) break; 
                        if (i === 4) break; 
                    }
                }

                if (!resultText) {
                    if (lastError) {
                        const errMsg = lastError.message.toLowerCase();
                        if (errMsg.includes("high demand")) {
                            throw new Error("Google AI 伺服器目前過度擁擠。系統已嘗試連線 5 次仍無法擠入，請稍等一兩分鐘後再點擊生成。");
                        } else if (errMsg.includes("quota")) {
                            throw new Error("您的 API 金鑰已達 Google 免費額度上限！建議：1. 稍等10~30秒、2. 等待明天重置、3. 換一個 Google 帳號申請新金鑰。");
                        }
                    }
                    throw lastError || new Error("無法取得生成內容");
                }

                // 移除 loading 區塊
                const loadingEl = document.getElementById(loadingId);
                if (loadingEl) loadingEl.remove();

                // 增加草稿版本計數
                window.currentDraftCount++;
                
                // 顯示左側的「查看草稿」按鈕
                if (els.viewDraftsBtn) {
                    els.viewDraftsBtn.classList.remove('hidden');
                    if (els.draftCountText) els.draftCountText.textContent = window.currentDraftCount;
                }

                // 建立新的草稿版本區塊
                const draftContainer = document.createElement('div');
                draftContainer.className = 'mb-6 pb-6 border-b border-slate-200 last:border-0 last:pb-0 last:mb-0';
                draftContainer.innerHTML = `
                    <div class="flex items-center justify-between mb-4">
                        <span class="px-3 py-1 bg-blue-100 text-blue-700 rounded-full text-xs font-bold tracking-wider">📝 版本 ${window.currentDraftCount}</span>
                        <button class="copy-single-btn text-slate-400 hover:text-blue-600 transition-colors p-1.5 bg-slate-50 rounded-lg hover:bg-blue-50 border border-slate-100" title="複製此版本">
                            <i data-lucide="copy" class="w-4 h-4"></i>
                        </button>
                    </div>
                    <div class="markdown-content markdown-body text-[15px] leading-relaxed"></div>
                `;
                els.aiOutput.appendChild(draftContainer);
                lucide.createIcons();
                
                const mdContent = draftContainer.querySelector('.markdown-content');
                const singleCopyBtn = draftContainer.querySelector('.copy-single-btn');
                
                // 設定單一版本的複製功能
                singleCopyBtn.addEventListener('click', () => {
                    const el = document.createElement('textarea');
                    el.value = mdContent.innerText;
                    document.body.appendChild(el);
                    el.select();
                    document.execCommand('copy');
                    document.body.removeChild(el);
                    
                    const origHtml = singleCopyBtn.innerHTML;
                    singleCopyBtn.innerHTML = '<i data-lucide="check" class="w-4 h-4 text-green-600"></i>';
                    singleCopyBtn.classList.replace('bg-slate-50', 'bg-green-50');
                    lucide.createIcons();
                    setTimeout(() => { 
                        singleCopyBtn.innerHTML = origHtml; 
                        singleCopyBtn.classList.replace('bg-green-50', 'bg-slate-50');
                        lucide.createIcons(); 
                    }, 2000);
                });

                // 執行打字機效果寫入特定的區塊
                await typeWriterEffect(resultText, mdContent);
                
                els.copyBtn.classList.remove('hidden'); // 顯示頂部的「複製全部」按鈕

            } catch (err) {
                // 若產生失敗，把剛剛產生的 loading 區塊移除
                const loadingEl = document.getElementById(loadingId);
                if (loadingEl) loadingEl.remove();
                
                if (window.currentDraftCount === 0) {
                    els.aiEmptyState.classList.remove('hidden');
                }
                window.showMsg(`生成失敗：${err.message}`, "error");
            } finally {
                els.generateBtn.disabled = false;
                els.generateBtn.innerHTML = `<i data-lucide="wand-2" class="w-4 h-4"></i><span>生成草稿</span>`;
                lucide.createIcons();
            }
        });

        // 複製全部草稿功能 (右上角按鈕)
        els.copyBtn.addEventListener('click', () => {
            const allMarkdownContents = Array.from(els.aiOutput.querySelectorAll('.markdown-content'))
                                            .map(el => el.innerText)
                                            .join('\n\n====================\n\n');
            
            const el = document.createElement('textarea');
            el.value = allMarkdownContents;
            document.body.appendChild(el);
            el.select();
            document.execCommand('copy');
            document.body.removeChild(el);
            
            const originalHtml = els.copyBtn.innerHTML;
            els.copyBtn.innerHTML = `<i data-lucide="check" class="w-4 h-4 text-green-600"></i> <span class="text-green-600">已複製全部</span>`;
            els.copyBtn.classList.add('bg-green-50', 'border-green-200');
            lucide.createIcons();
            
            setTimeout(() => {
                els.copyBtn.innerHTML = originalHtml;
                els.copyBtn.classList.remove('bg-green-50', 'border-green-200');
                lucide.createIcons();
            }, 2000);
        });

        // 下載與清除功能
        els.exportBtn.addEventListener('click', () => {
            if (globalExcelData.length === 0) return window.showMsg("無資料可下載");
            const worksheet = XLSX.utils.json_to_sheet(globalExcelData);
            const workbook = XLSX.utils.book_new();
            XLSX.utils.book_append_sheet(workbook, worksheet, "Data");
            XLSX.writeFile(workbook, `Backup_${new Date().toISOString().split('T')[0]}.xlsx`);
            window.showMsg("下載成功", "success");
        });

        els.resetDataBtn.addEventListener('click', () => {
            document.getElementById('confirmModalOverlay').classList.remove('hidden');
        });

        document.getElementById('cancelResetBtn').addEventListener('click', () => {
            document.getElementById('confirmModalOverlay').classList.add('hidden');
        });

        document.getElementById('confirmResetActionBtn').addEventListener('click', async () => {
            document.getElementById('confirmModalOverlay').classList.add('hidden');
            window.clearLocalMemory();
            if (window.clearAllCloudData) {
                await window.clearAllCloudData();
            }
            window.showMsg("系統資料已全數清除", "success");
            toggleSettings(false);
        });

    </script>
</body>
</html>
